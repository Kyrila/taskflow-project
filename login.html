<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            goldenrod: '#DAA520',
          },
          fontFamily: {
            garamond: ['"EB Garamond"', 'serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="min-h-screen flex flex-col bg-black font-garamond text-goldenrod">
  <!-- HEADER -->
  <header class="h-[20vh] w-full flex items-center justify-center">
    <a
      href="index.html"
      class="block w-2/3 md:w-1/2 lg:w-1/3 max-w-md"
    >
      <img
        src="img/Music-App-logo.svg"
        alt="Music App logo"
        class="w-full h-auto block"
      />
    </a>
  </header>

  <!-- MAIN -->
  <main class="relative flex-1 flex items-center justify-center px-4 py-8 overflow-hidden">
    <video
      class="hero absolute inset-0 w-full h-full object-cover -z-10 opacity-40"
      autoplay
      loop
      muted
      src="media/polvo.mp4"
      playsinline
    ></video>

    <section
      class="w-full max-w-md bg-black/75 border border-goldenrod/60 rounded-2xl shadow-2xl px-6 py-7 backdrop-blur-sm"
    >
      <h2 class="text-2xl font-semibold text-center tracking-wide mb-5">
        Login
      </h2>

      <form class="flex flex-col gap-4">
        <label class="flex flex-col gap-1 text-sm" for="login-email">
          Email
          <input
            id="login-email"
            type="email"
            placeholder="Write your email"
            required
            class="px-3 py-2 rounded-lg border border-goldenrod/80 bg-black/80 text-goldenrod placeholder-yellow-300/90 outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
          />
        </label>

        <label class="flex flex-col gap-1 text-sm" for="login-password">
          Password
          <input
            id="login-password"
            type="password"
            placeholder="Write your password"
            required
            class="px-3 py-2 rounded-lg border border-goldenrod/80 bg-black/80 text-goldenrod placeholder-yellow-300/90 outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
          />
        </label>

        <button
          type="submit"
          class="mt-2 inline-flex items-center justify-center w-full px-4 py-2 rounded-full border border-goldenrod bg-goldenrod text-black font-semibold text-xs tracking-wide uppercase cursor-pointer transition-all duration-200 hover:bg-yellow-400 hover:-translate-y-[2px] hover:shadow-lg"
        >
          Sign in
        </button>
      </form>
    </section>
  </main>

  <!-- FOOTER -->
  <footer
    class="w-full bg-goldenrod text-black flex flex-wrap justify-between items-center px-4 py-3 gap-4"
  >
    <section class="flex items-center gap-4">
      <figure>
        <img
          src="img/Facebook.svg"
          alt="Facebook logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
      <figure>
        <img
          src="img/Instagram.svg"
          alt="Instagram logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
      <figure>
        <img
          src="img/Twitter.svg"
          alt="Twitter logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
    </section>

    <section>
      <h4 class="text-sm md:text-base">
        Music App by Kyrila ©2026
      </h4>
    </section>

    <section class="mr-0 md:mr-4">
      <h4 class="text-sm md:text-base">
        <a
          href="terms.html"
          class="no-underline text-black hover:text-gray-600 transition-colors"
        >
          Terms and conditions
        </a>
      </h4>
    </section>
  </footer>
</body>
</html>
