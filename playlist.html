<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My playlist - Music App</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            goldenrod: '#DAA520',
          },
          fontFamily: {
            garamond: ['"EB Garamond"', 'serif'],
          },
        },
      },
    };
  </script>

  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .playlist-list {
      scrollbar-width: thin;
      scrollbar-color: #DAA520 #000000;
    }

    .playlist-list::-webkit-scrollbar {
      width: 6px;
    }

    .playlist-list::-webkit-scrollbar-track {
      background: #000000;
    }

    .playlist-list::-webkit-scrollbar-thumb {
      background-color: #DAA520;
      border-radius: 999px;
    }

    .theme-light .playlist input,
    .theme-light .playlist select {
      background-color: #ffffff;
      color: #000000;
      border-color: #000000;
    }

    .theme-light .playlist input::placeholder {
      color: #555555;
    }

    .theme-light .playlist .song-item {
      background-color: rgba(0, 0, 0, 0.04);
      border-color: rgba(0, 0, 0, 0.3);
      color: #000000;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-black font-garamond text-goldenrod">
  <!-- Theme toggle -->
  <button
    id="theme-toggle"
    type="button"
    class="fixed top-4 right-4 z-20 rounded-full border border-goldenrod bg-black/80 px-3 py-1 text-xs md:text-sm text-goldenrod hover:bg-goldenrod hover:text-black transition-colors duration-200"
    aria-label="Cambiar tema de la interfaz"
  >
    Light theme
  </button>

  <!-- Header -->
  <header class="h-[20vh] w-full flex flex-col items-center justify-center gap-2">
    <a
      href="index.html"
      class="block w-2/3 md:w-1/2 lg:w-1/3 max-w-md"
    >
      <img
        src="img/Music-App-logo.svg"
        alt="Music App logo"
        class="w-full h-auto block"
      />
    </a>
    <h1 class="text-xl md:text-2xl font-semibold tracking-wide">
      My playlist
    </h1>
  </header>

  <!-- Main -->
  <main class="flex-1 px-4 pb-6 md:px-8">
    <section
      class="playlist mx-auto max-w-4xl grid gap-6 md:grid-cols-[minmax(0,2fr)_minmax(0,3fr)]"
    >
      <!-- Formulario -->
      <section
        aria-labelledby="playlist-form-title"
        class="rounded-lg border border-goldenrod bg-goldenrod/10 p-4"
      >
        <h2
          id="playlist-form-title"
          class="mb-4 text-lg font-semibold tracking-wide"
        >
          Add a song
        </h2>

        <form
          id="playlist-form"
          autocomplete="off"
          class="flex flex-col gap-3"
        >
          <div class="flex flex-col gap-1">
            <label for="song-title" class="text-xs uppercase tracking-wide"
              >Title</label
            >
            <input
              id="song-title"
              type="text"
              maxlength="120"
              placeholder="Song name"
              class="rounded-md border border-goldenrod bg-black px-3 py-2 text-goldenrod placeholder-yellow-300 focus:outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="song-artist" class="text-xs uppercase tracking-wide"
              >Artist</label
            >
            <input
              id="song-artist"
              type="text"
              maxlength="120"
              placeholder="Artist name"
              class="rounded-md border border-goldenrod bg-black px-3 py-2 text-goldenrod placeholder-yellow-300 focus:outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
            />
          </div>

          <div class="flex flex-col gap-1">
            <label for="song-genre" class="text-xs uppercase tracking-wide"
              >Genre</label
            >
            <select
              id="song-genre"
              class="rounded-md border border-goldenrod bg-black px-3 py-2 text-goldenrod text-sm focus:outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
            >
              <option value="rap">RAP</option>
              <option value="rock">ROCK</option>
              <option value="hip-hop">HIP-HOP</option>
              <option value="classical">CLASSICAL</option>
              <option value="blues">BLUES</option>
              <option value="electro">ELECTRO</option>
              <option value="pop">POP</option>
              <option value="rnb">R&amp;B</option>
              <option value="soul">SOUL</option>
              <option value="indie">INDIE</option>
              <option value="flamenco">FLAMENCO</option>
              <option value="jazz">JAZZ</option>
            </select>
          </div>

          <div class="flex flex-col gap-1">
            <label for="song-url" class="text-xs uppercase tracking-wide"
              >Link (YouTube / Spotify)</label
            >
            <input
              id="song-url"
              type="url"
              placeholder="https://..."
              class="rounded-md border border-goldenrod bg-black px-3 py-2 text-goldenrod placeholder-yellow-300 focus:outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
            />
          </div>

          <button
            type="submit"
            class="mt-2 inline-flex items-center justify-center rounded-md bg-goldenrod px-3 py-2 text-sm font-semibold text-black tracking-wide hover:bg-yellow-400 hover:-translate-y-[1px] transition-all duration-200"
          >
            Add to playlist
          </button>
        </form>
      </section>

      <!-- Lista -->
      <section
        aria-labelledby="playlist-list-title"
        class="rounded-lg border border-goldenrod bg-goldenrod/10 p-4 flex flex-col"
      >
        <div class="mb-3 flex items-center justify-between gap-3">
          <h2
            id="playlist-list-title"
            class="text-lg font-semibold tracking-wide"
          >
            Saved songs
          </h2>

          <div class="flex items-center gap-2 text-xs">
            <label for="playlist-filter" class="uppercase tracking-wide"
              >Filter by genre</label
            >
            <select
              id="playlist-filter"
              class="rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod text-xs focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
            >
              <option value="all">All</option>
              <option value="rap">RAP</option>
              <option value="rock">ROCK</option>
              <option value="hip-hop">HIP-HOP</option>
              <option value="classical">CLASSICAL</option>
              <option value="blues">BLUES</option>
              <option value="electro">ELECTRO</option>
              <option value="pop">POP</option>
              <option value="rnb">R&amp;B</option>
              <option value="soul">SOUL</option>
              <option value="indie">INDIE</option>
              <option value="flamenco">FLAMENCO</option>
              <option value="jazz">JAZZ</option>
            </select>
          </div>
        </div>

        <ul
          id="playlist-list"
          aria-live="polite"
          aria-label="Playlist de canciones guardadas"
          class="playlist-list flex-1 mt-2 flex flex-col gap-2 list-none p-0 max-h-80 overflow-y-auto pr-1"
        ></ul>
      </section>
    </section>
  </main>

  <footer
    class="w-full bg-goldenrod text-black flex flex-wrap justify-between items-center px-4 py-3 gap-4"
  >
    <section class="flex items-center gap-4">
      <a href="index.html" class="no-underline text-black hover:text-gray-700"
        >Volver al inicio</a
      >
    </section>

    <section>
      <h4 class="text-sm md:text-base">
        Music App by Kyrila ©2026
      </h4>
    </section>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
