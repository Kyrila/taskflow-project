<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Music App</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            goldenrod: '#DAA520',
          },
          fontFamily: {
            garamond: ['"EB Garamond"', 'serif'],
          },
        },
      },
    };
  </script>

  <!-- Utilidad para esconder texto solo visualmente (sr-only) -->
  <style>
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* Scrollbar personalizado para listas de tareas */
    .todo ul {
      scrollbar-width: thin;
      scrollbar-color: #DAA520 #000000; /* thumb, track */
    }

    .todo ul::-webkit-scrollbar {
      width: 6px;
    }

    .todo ul::-webkit-scrollbar-track {
      background: #000000;
    }

    .todo ul::-webkit-scrollbar-thumb {
      background-color: #DAA520;
      border-radius: 999px;
    }

    /* Estilos de inputs/select en tema claro para la sección de tareas */
    .theme-light .todo input,
    .theme-light .todo select {
      background-color: #ffffff;
      color: #000000;
      border-color: #000000;
    }

    .theme-light .todo input::placeholder {
      color: #555555;
    }

    /* En tema claro: enlaces Login, About, Contact en blanco */
    .theme-light a[href="login.html"],
    .theme-light a[href="about.html"],
    .theme-light a[href="contact.html"] {
      color: #ffffff !important;
    }

    .theme-light a[href="login.html"]:hover,
    .theme-light a[href="about.html"]:hover,
    .theme-light a[href="contact.html"]:hover {
      color: #e5e5e5 !important;
    }

    /* En tema claro: quitar filtro/opacidad del vídeo de fondo */
    .theme-light video {
      opacity: 1 !important;
    }

    /* En tema claro: tarjetas de tareas más claras y texto blanco */
    .theme-light .todo .todo-item {
      background-color: rgba(255, 255, 255, 0.2);
      border-color: rgba(255, 255, 255, 0.6);
      color: #ffffff;
    }

    .theme-light .todo .todo-item .todo-text {
      color: #ffffff;
    }

    .theme-light .todo .todo-item span {
      color: #ffffff;
    }
  </style>
</head>

<body class="min-h-screen flex flex-col bg-black font-garamond text-goldenrod">
  
  <!-- Botón de cambio de tema -->
  <button
    id="theme-toggle"
    type="button"
    class="fixed top-4 right-4 z-20 rounded-full border border-goldenrod bg-black/80 px-3 py-1 text-xs md:text-sm text-goldenrod hover:bg-goldenrod hover:text-black transition-colors duration-200"
    aria-label="Cambiar tema de la interfaz"
  >
    Light theme
  </button>

  <!-- HEADER -->
  <header class="h-[20vh] w-full flex items-center justify-center">
    <a
      href="index.html"
      class="block w-2/3 md:w-1/2 lg:w-1/3 max-w-md"
    >
      <img
        src="img/Music-App-logo.svg"
        alt="Music App logo"
        class="w-full h-auto block"
      />
    </a>
  </header>

  <!-- MAIN -->
  <main class="relative h-[70vh] flex justify-between overflow-hidden px-4">
    <!-- Vídeo de fondo -->
    <video
      class="absolute inset-0 w-full h-full object-cover -z-10 opacity-70"
      autoplay
      loop
      muted
      src="media/polvo.mp4"
      playsinline
    ></video>

    <!-- GRID de géneros -->
    <div
      class="relative z-10 w-full md:w-4/5 grid grid-cols-2 md:grid-cols-4 gap-6 md:gap-10 m-4 md:m-10"
    >
      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="rap.html" class="block px-4 py-3 no-underline">RAP</a></h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="rock.html" class="block px-4 py-3 no-underline">ROCK</a></h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2>
          <a href="hip-hop.html" class="block px-4 py-3 no-underline">HIP-HOP</a>
        </h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2>
          <a href="classical.html" class="block px-4 py-3 no-underline"
            >CLASSICAL</a
          >
        </h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="blues.html" class="block px-4 py-3 no-underline">BLUES</a></h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2>
          <a href="electro.html" class="block px-4 py-3 no-underline">ELECTRO</a>
        </h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="pop.html" class="block px-4 py-3 no-underline">POP</a></h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="rnb.html" class="block px-4 py-3 no-underline">R&amp;B</a></h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="soul.html" class="block px-4 py-3 no-underline">SOUL</a></h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2>
          <a href="indie.html" class="block px-4 py-3 no-underline">INDIE</a>
        </h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2>
          <a href="flamenco.html" class="block px-4 py-3 no-underline"
            >FLAMENCO</a
          >
        </h2>
      </section>

      <section
        class="flex items-center justify-center rounded-xl bg-goldenrod/90 text-black text-lg font-semibold shadow-md hover:bg-yellow-400 hover:-translate-y-2 hover:shadow-2xl transition-all duration-300"
      >
        <h2><a href="jazz.html" class="block px-4 py-3 no-underline">JAZZ</a></h2>
      </section>
    </div>

    <!-- ASIDE + To-Do -->
    <aside
      class="relative z-10 hidden md:flex flex-col gap-4 w-1/5 ml-4 text-right"
    >
      <h3
        class="transition-all duration-300 hover:text-2xl cursor-pointer inline-block self-center"
      >
        <a href="login.html" class="no-underline text-goldenrod">Login</a>
      </h3>
      <h3
        class="transition-all duration-300 hover:text-2xl cursor-pointer inline-block self-center"
      >
        <a href="about.html" class="no-underline text-goldenrod">About us</a>
      </h3>
      <h3
        class="transition-all duration-300 hover:text-2xl cursor-pointer inline-block self-center"
      >
        <a href="contact.html" class="no-underline text-goldenrod">Contact</a>
      </h3>
      <h3
        class="transition-all duration-300 hover:text-2xl cursor-pointer inline-block self-center"
      >
        <a href="playlist.html" class="no-underline text-goldenrod">My playlist</a>
      </h3>

      <!-- To-Do List (mantenemos las clases usadas por JS: .todo, .todo-item, .delete-btn) -->
      <section
        class="todo mt-5 p-4 rounded-lg border border-goldenrod bg-goldenrod/10 text-goldenrod text-left"
        aria-labelledby="todo-title"
      >
        <h3
          id="todo-title"
          class="mb-3 text-center text-xl font-semibold tracking-wide"
        >
          My tasks
        </h3>

        <!-- Controles de nivel y filtro -->
        <div class="mb-3 flex flex-col gap-2 text-sm">
          <div class="flex items-center justify-between gap-2">
            <label for="task-level" class="text-xs uppercase tracking-wide"
              >Nivel de tarea</label
            >
            <select
              id="task-level"
              class="max-w-[60%] rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod text-xs focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
            >
              <option value="facil">Fácil</option>
              <option value="medio" selected>Media</option>
              <option value="dificil">Difícil</option>
            </select>
          </div>

          <div class="flex items-center justify-between gap-2">
            <label for="task-filter" class="text-xs uppercase tracking-wide"
              >Filtrar tareas</label
            >
            <select
              id="task-filter"
              class="max-w-[60%] rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod text-xs focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
            >
              <option value="all">Todas</option>
              <option value="facil">Fáciles</option>
              <option value="medio">Medias</option>
              <option value="dificil">Difíciles</option>
            </select>
          </div>
        </div>

        <form
          id="task-form"
          autocomplete="off"
          class="flex flex-col gap-2"
        >
          <label class="sr-only" for="new-task">New task</label>
          <input
            id="new-task"
            type="text"
            placeholder="Write a task…"
            maxlength="120"
            aria-label="Escribe una tarea"
            class="px-3 py-2 rounded-md border border-goldenrod bg-black text-goldenrod placeholder-yellow-300 focus:outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
          />
          <div class="flex items-center justify-between gap-2 text-xs">
            <label for="task-date" class="uppercase tracking-wide"
              >Fecha límite</label
            >
            <input
              id="task-date"
              type="date"
              class="max-w-[60%] rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
            />
          </div>
          <button
            type="submit"
            aria-label="Añadir tarea"
            class="inline-flex items-center justify-center px-3 py-2 rounded-md bg-goldenrod text-black font-semibold tracking-wide hover:bg-yellow-400 hover:-translate-y-[2px] transition-all duration-200"
          >
            Add
          </button>
        </form>

        <ul
          id="todo-list"
          aria-live="polite"
          aria-label="Lista de tareas"
          class="mt-4 flex flex-col gap-2 list-none p-0 max-h-56 overflow-y-auto pr-1"
        ></ul>
      </section>
    </aside>
  </main>

  <!-- ASIDE responsive (para móviles, debajo de la grid) -->
  <section
    class="md:hidden px-4 pb-4 flex flex-col gap-3 text-center bg-black/80"
  >
    <div class="flex justify-around text-goldenrod">
      <a
        href="login.html"
        class="no-underline hover:text-yellow-300 transition-colors"
        >Login</a
      >
      <a
        href="about.html"
        class="no-underline hover:text-yellow-300 transition-colors"
        >About us</a
      >
      <a
        href="contact.html"
        class="no-underline hover:text-yellow-300 transition-colors"
        >Contact</a
      >
      <a
        href="playlist.html"
        class="no-underline hover:text-yellow-300 transition-colors"
        >My playlist</a
      >
    </div>

    <section
      class="todo mt-3 p-4 rounded-lg border border-goldenrod bg-goldenrod/10 text-goldenrod text-left"
      aria-labelledby="todo-title-mobile"
    >
      <h3
        id="todo-title-mobile"
        class="mb-3 text-center text-xl font-semibold tracking-wide"
      >
        My tasks
      </h3>

      <!-- Controles de nivel y filtro para móvil -->
      <div class="mb-3 flex flex-col gap-2 text-sm">
        <div class="flex items-center justify-between gap-2">
          <label for="task-level-mobile" class="text-xs uppercase tracking-wide"
            >Nivel de tarea</label
          >
          <select
            id="task-level-mobile"
            class="max-w-[60%] rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod text-xs focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
          >
            <option value="facil">Fácil</option>
            <option value="medio" selected>Media</option>
            <option value="dificil">Difícil</option>
          </select>
        </div>

        <div class="flex items-center justify-between gap-2">
          <label
            for="task-filter-mobile"
            class="text-xs uppercase tracking-wide"
            >Filtrar tareas</label
          >
          <select
            id="task-filter-mobile"
            class="max-w-[60%] rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod text-xs focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
          >
            <option value="all">Todas</option>
            <option value="facil">Fáciles</option>
            <option value="medio">Medias</option>
            <option value="dificil">Difíciles</option>
          </select>
        </div>
      </div>

      <form
        id="task-form-mobile"
        autocomplete="off"
        class="flex flex-col gap-2"
      >
        <label class="sr-only" for="new-task-mobile">New task</label>
        <input
          id="new-task-mobile"
          type="text"
          placeholder="Write a task…"
          maxlength="120"
          aria-label="Escribe una tarea"
          class="px-3 py-2 rounded-md border border-goldenrod bg-black text-goldenrod placeholder-yellow-300 focus:outline-none focus:border-yellow-300 focus:ring-2 focus:ring-yellow-400/60"
        />
        <div class="flex items-center justify-between gap-2 text-xs">
          <label for="task-date-mobile" class="uppercase tracking-wide"
            >Fecha límite</label
          >
          <input
            id="task-date-mobile"
            type="date"
            class="max-w-[60%] rounded-md border border-goldenrod bg-black px-2 py-1 text-goldenrod focus:outline-none focus:border-yellow-300 focus:ring-1 focus:ring-yellow-400/60"
          />
        </div>
        <button
          type="submit"
          aria-label="Añadir tarea"
          class="inline-flex items-center justify-center px-3 py-2 rounded-md bg-goldenrod text-black font-semibold tracking-wide hover:bg-yellow-400 hover:-translate-y-[2px] transition-all duration-200"
        >
          Add
        </button>
      </form>

      <ul
        id="todo-list-mobile"
        aria-live="polite"
        aria-label="Lista de tareas"
        class="mt-4 flex flex-col gap-2 list-none p-0 max-h-56 overflow-y-auto pr-1"
      ></ul>
    </section>
  </section>

  <!-- FOOTER -->
  <footer
    class="w-full bg-goldenrod text-black flex flex-wrap justify-between items-center px-4 py-3 gap-4"
  >
    <section class="flex items-center gap-4">
      <figure>
        <img
          src="img/Facebook.svg"
          alt="Facebook logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
      <figure>
        <img
          src="img/Instagram.svg"
          alt="Instagram logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
      <figure>
        <img
          src="img/Twitter.svg"
          alt="Twitter logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
    </section>

    <section>
      <h4 class="text-sm md:text-base">
        Music App by Kyrila ©2026
      </h4>
    </section>

    <section class="conditions mr-0 md:mr-4">
      <h4 class="text-sm md:text-base">
        <a
          href="terms.html"
          class="no-underline text-black hover:text-gray-600 transition-colors"
          >Terms and conditions</a
        >
      </h4>
    </section>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
