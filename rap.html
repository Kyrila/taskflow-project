<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rap</title>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap"
    rel="stylesheet"
  />

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            goldenrod: '#DAA520',
          },
          fontFamily: {
            garamond: ['"EB Garamond"', 'serif'],
          },
        },
      },
    };
  </script>
</head>

<body class="min-h-screen flex flex-col bg-black font-garamond text-goldenrod">
  <!-- HEADER -->
  <header class="h-[20vh] w-full flex items-center justify-center">
    <a
      href="index.html"
      class="block w-2/3 md:w-1/2 lg:w-1/3 max-w-md"
    >
      <img
        src="img/Music-App-logo.svg"
        alt="Music App logo"
        class="w-full h-auto block"
      />
    </a>
  </header>

  <!-- MAIN -->
  <main
    id="maingenre"
    class="relative flex-1 flex flex-col items-center px-4 py-6 overflow-hidden"
  >
    <video
      class="hero absolute inset-0 w-full h-full object-cover -z-10 opacity-40"
      autoplay
      loop
      muted
      src="media/polvo.mp4"
      playsinline
    ></video>

    <!-- NAV de géneros -->
    <nav
      class="relative z-10 w-full max-w-5xl flex flex-wrap justify-center gap-3 md:gap-4 mb-6"
    >
      <a href="index.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Inicio
      </a>
      <a href="rap.html"
         class="px-3 py-1 rounded-full border border-goldenrod bg-goldenrod text-black text-sm md:text-base font-semibold">
        Rap
      </a>
      <a href="rock.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Rock
      </a>
      <a href="hip-hop.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Hip-Hop
      </a>
      <a href="classical.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Classical
      </a>
      <a href="blues.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Blues
      </a>
      <a href="electro.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Electro
      </a>
      <a href="pop.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Pop
      </a>
      <a href="rnb.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        R&amp;B
      </a>
      <a href="soul.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Soul
      </a>
      <a href="indie.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Indie
      </a>
      <a href="flamenco.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Flamenco
      </a>
      <a href="jazz.html"
         class="px-3 py-1 rounded-full border border-goldenrod/40 bg-black/60 text-sm md:text-base hover:bg-goldenrod hover:text-black transition">
        Jazz
      </a>
    </nav>

    <!-- Contenido del género (puedes ampliarlo más tarde) -->
    <section
      class="relative z-10 w-full max-w-3xl bg-black/75 border border-goldenrod/60 rounded-2xl shadow-2xl px-6 py-7 backdrop-blur-sm text-center"
    >
      <h1 class="text-3xl font-semibold mb-3">Rap</h1>
      <p class="text-sm md:text-base">
        Here you can describe Rap music, artists, playlists or any content you
        want to show for this genre.
      </p>
    </section>
  </main>

  <!-- FOOTER -->
  <footer
    class="w-full bg-goldenrod text-black flex flex-wrap justify-between items-center px-4 py-3 gap-4"
  >
    <section class="flex items-center gap-4">
      <figure>
        <img
          src="img/Facebook.svg"
          alt="Facebook logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
      <figure>
        <img
          src="img/Instagram.svg"
          alt="Instagram logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
      <figure>
        <img
          src="img/Twitter.svg"
          alt="Twitter logo"
          class="h-8 w-auto max-w-[40px]"
        />
      </figure>
    </section>

    <section>
      <h4 class="text-sm md:text-base">
        Music App by Kyrila ©2026
      </h4>
    </section>

    <section class="mr-0 md:mr-4">
      <h4 class="text-sm md:text-base">
        <a
          href="terms.html"
          class="no-underline text-black hover:text-gray-600 transition-colors"
        >
          Terms and conditions
        </a>
      </h4>
    </section>
  </footer>
</body>
</html>
